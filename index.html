<!doctype html>

<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Revista Digital</title>
  <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #111;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #book {
      width: min(90vw, 1100px);
      height: min(90vw, 1100px);
      max-height: 90vh;
    }

    .page {
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border-radius: 12px;
    }

    .page img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
  </style>

</head>
<body>
  <div id="book">
    <div class="page"><img src="img/01.jpg" alt="1"></div>
    <div class="page"><img src="img/02.jpg" alt="2"></div>
    <div class="page"><img src="img/03.jpg" alt="3"></div>
    <div class="page"><img src="img/04.jpg" alt="4"></div>
    <div class="page"><img src="img/05.jpg" alt="5"></div>
    <div class="page"><img src="img/06.jpg" alt="6"></div>
    <div class="page"><img src="img/07.jpg" alt="7"></div>
    <div class="page"><img src="img/08.jpg" alt="8"></div>
    <div class="page"><img src="img/09.jpg" alt="9"></div>
  </div>

  <script>
    window.onload = function () {
      const pageFlip = new St.PageFlip(document.getElementById("book"), {
        width: 1080,
        height: 1080,
        size: "stretch",
        minWidth: 250,
        minHeight: 250,
        maxWidth: 1200,
        maxHeight: 1200,
        showCover: true
      });

      pageFlip.loadFromHTML(document.querySelectorAll(".page"));
    };
  </script>

</body>
</html>
